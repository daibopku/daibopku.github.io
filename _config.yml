# Site settings
title: "Bo Dai"
description: "Postdoc in AI at Peking University, researching Intuitive Physics and Aritficial General Intelligence (AGI)."
baseurl: "" # the subpath of your site, e.g. /blog (leave empty for user/org site)
url: "https://daibopku.github.io" # the base hostname & protocol for your site

# Author info
author:
  name: "Bo Dai"
  email: "daibo@bigai.ai"
  cv: # Path to CV PDF, e.g. "files/cv.pdf"
  twitter: 
  github: 
  linkedin: 
  google_scholar: https://scholar.google.com/citations?user=y-Mz7PwAAAAJ&hl=en

# Personal info
avatar: "images/avatar.jpg"  # Path to your profile photo
institution: "Beijing Institute for General Artificial Intelligence (BIGAI)"
institution_url: "https://www.bigai.ai/"
advisor: "Prof. Song-Chun Zhu"
advisor_url: "http://www.stat.ucla.edu/~sczhu/"

# Jekyll settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Timezone
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

# Collections - Publications
collections:
  publications:
    output: true
    permalink: /publication/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - README.md
  - LICENSE
  - _projects/
  - projects.html
