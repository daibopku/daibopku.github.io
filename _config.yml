# Site settings
title: "Bo Dai"
description: "Postdoc in AI at Peking University, researching Intuitive Physics and Cognitive Science"
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site

# Author info
author:
  name: "Bo Dai"
  email: "your.email@example.com"
  twitter: 
  github: 
  linkedin: 
  google_scholar: 

# Personal info
avatar: # URL to your profile photo
institution: "Beijing Institute for General Artificial Intelligence (BIGAI)"
institution_url: "https://www.bigai.ai/"
advisor: "Prof. Song-Chun Zhu"
advisor_url: "http://www.stat.ucla.edu/~sczhu/"

# Jekyll settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Timezone
timezone: Asia/Shanghai

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate

# Collections - Projects
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .github/
  - README.md
  - LICENSE

# GitHub Pages settings (for local development compatibility)
# Note: When using GitHub Actions, these are handled by the workflow
